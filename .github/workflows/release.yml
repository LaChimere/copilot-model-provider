name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-image:
    name: Publish GHCR image and release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive release metadata
        id: vars
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          image="ghcr.io/$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          sha_tag="sha-${GITHUB_SHA::7}"

          {
            echo "tag=${tag}"
            echo "version=${version}"
            echo "image=${image}"
            echo "sha_tag=${sha_tag}"
          } >> "${GITHUB_OUTPUT}"

      - name: Verify tag matches project version
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.vars.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import sys
          import tomllib

          pyproject = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          package_version = pyproject['project']['version']
          tag_version = os.environ['RELEASE_VERSION']

          if package_version != tag_version:
              print(
                  'Release tag does not match pyproject version: '
                  f'{tag_version!r} != {package_version!r}',
                  file=sys.stderr,
              )
              raise SystemExit(1)
          PY

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate container metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.tag }}
            type=raw,value=${{ steps.vars.outputs.sha_tag }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=copilot-model-provider
            org.opencontainers.image.description=General-purpose model provider built on github-copilot-sdk.
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.vars.outputs.tag }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Generate release notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE: ${{ steps.vars.outputs.image }}
          TAG: ${{ steps.vars.outputs.tag }}
          SHA_TAG: ${{ steps.vars.outputs.sha_tag }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          gh api \
            --method POST \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${TAG}" \
            > generated-notes.json

          python - <<'PY'
          import json
          import os
          import pathlib

          generated = json.loads(pathlib.Path('generated-notes.json').read_text())
          body_lines = [
              '## Container image',
              '',
              f"- `{os.environ['IMAGE']}:{os.environ['TAG']}`",
              f"- `{os.environ['IMAGE']}:{os.environ['SHA_TAG']}`",
              f"- `{os.environ['IMAGE']}:latest`",
              '',
              f"Digest: `{os.environ['DIGEST']}`",
              '',
              generated['body'],
              '',
          ]
          body = '\n'.join(body_lines)
          pathlib.Path('release-notes.md').write_text(body)
          PY

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" \
              --latest \
              --notes-file release-notes.md
          else
            gh release create "${TAG}" \
              --title "${TAG}" \
              --latest \
              --notes-file release-notes.md
          fi
